provider: anthropic
model: claude-sonnet-4-6
api_key_env: ANTHROPIC_API_KEY
base_url: null
backend: docker
sandbox:
  image: pilot-agent-sandbox:latest
  network: bridge
summarizer_model: null
budget_ratio: 0.7
max_turns: 200
tool_timeout_s: 120
phases:
  deploy:
    enabled: true
    vercel_token_env: VERCEL_TOKEN
  marketing:
    enabled: true
tools:
  web_search:
    enabled: true
    provider: tavily
    max_results: 5
    searxng_url: null
  web_fetch:
    enabled: false
  deploy:
    enabled: true
  tool_search:
    enabled: auto
    threshold_pct: 10.0
    search_default_limit: 5
    max_search_limit: 20
ui:
  color: auto
  show_token_counter: true
