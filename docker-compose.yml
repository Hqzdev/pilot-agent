services:
  pilot-agent:
    build: .
    image: pilot-agent:latest
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - pilot-agent-home:/home/agent/.pilot-agent
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - VERCEL_TOKEN=${VERCEL_TOKEN:-}
    # Uncomment for manual browser checks from the host:
    # ports:
    #   - "3000:3000"
    #   - "8000:8000"

volumes:
  pilot-agent-home:
